<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แจ้งซ่อมเครื่องจักร</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        input[type=text],
        select,
        textarea,
        input[type=date],
        input[type=file] {
            width: 100%;
            padding: 12px 20px;
            margin: 8px 0;
            display: block;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            background-color: #4CAF50;
            color: white;
            padding: 14px 20px;
            margin: 8px 0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .box-gray {
            border-radius: 5px;
            background-color: #f2f2f2;
            padding: 20px;
            width: 50%;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
        }

        label {
            font-weight: bold;
        }

        .qr-scan-btn {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<h1>แจ้งซ่อมเครื่องจักร</h1>
<form id="repairForm">
    <label for="department">แผนก:</label>
    <input type="text" id="department" name="department" placeholder="กรอกชื่อแผนก..." required readonly>

    <label for="machineName">ชื่อเครื่องจักร:</label>
    <input type="text" id="machineName" name="machineName" placeholder="กรอกชื่อเครื่องจักร..." required readonly>

    <label for="machineNumber">หมายเลขเครื่อง:</label>
    <input type="text" id="machineNumber" name="machineNumber" placeholder="หมายเลขเครื่องจักร..." required>
    <button type="button" class="qr-scan-btn" onclick="scanQRCode()">สแกน QR Code</button>

    <label for="reporterName">ผู้แจ้ง:</label>
    <input type="text" id="reporterName" required readonly>

    <label for="jobType">ลักษณะงาน:</label>
    <select id="jobType" name="jobType" required>
        <option value="">เลือก...</option>
        <option value="ด่วน">ด่วน</option>
        <option value="ไม่ด่วน">ไม่ด่วน</option>
    </select>

    <label for="dueDate">ต้องการให้เสร็จภายใน:</label>
    <input type="date" id="dueDate" required>

    <label for="issueDescription">รายละเอียด:</label>
    <textarea id="issueDescription" rows="5" name="รายละเอียด" placeholder="รายละเอียด..." required></textarea>

    <label for="imageUpload">รูปรายละเอียด:</label>
    <input type="file" id="imageUpload" accept="image/*">

    <button type="submit">ส่งข้อมูล</button>
</form>

<script>
    let userId, displayName, pictureUrl;

    var GAS_URL = "https://script.google.com/macros/s/AKfycbzkpaPRlQwfL41cy-BOaksc96xuiI_BetrVN5GzeSqMRcrgf3ALUqJj1zx3e1JQLP7jyA/exec";

    function fetchUserData(uid, machineNumber) {
        return fetch(`${GAS_URL}?userId=${uid}&machineNumber=${machineNumber}`)
            .then(response => response.json())
            .catch(err => {
                console.error("Error fetching data from Google Sheet", err);
                Swal.fire({
                    title: 'เกิดข้อผิดพลาด',
                    text: 'ไม่สามารถดึงข้อมูลจาก Google Sheet ได้',
                    icon: 'error',
                    confirmButtonText: 'ตกลง'
                });
            });
    }

    document.getElementById("repairForm").addEventListener("submit", function(event) {
        event.preventDefault();

        const fileInput = document.getElementById("imageUpload").files[0];
        const reader = new FileReader();

        reader.onloadend = function() {
            const base64data = fileInput ? reader.result.split(',')[1] : '';
            const data = {
                department: document.getElementById("department").value,
                machineName: document.getElementById("machineName").value,
                machineNumber: document.getElementById("machineNumber").value,
                reporterName: document.getElementById("reporterName").value,
                jobType: document.getElementById("jobType").value,
                dueDate: document.getElementById("dueDate").value,
                issueDescription: document.getElementById("issueDescription").value,
                fileName: fileInput ? fileInput.name : '',
                mimeType: fileInput ? fileInput.type : '',
                fileData: base64data,
                userId: userId,
                displayName: displayName,
                pictureUrl: pictureUrl
            };

            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            }).then(() => {
                Swal.fire({
                    title: 'สำเร็จ',
                    text: 'ส่งข้อมูลเรียบร้อยแล้ว',
                    icon: 'success',
                    confirmButtonText: 'ปิด',
                    customClass: { popup: 'swal-popup-large' }
                }).then(() => { try { liff.closeWindow(); } catch(e) {} });
            }).catch(error => {
                console.error("Error:", error);
                Swal.fire({
                    title: 'เกิดข้อผิดพลาด',
                    text: 'ไม่สามารถส่งข้อมูลได้',
                    icon: 'error',
                    confirmButtonText: 'ตกลง'
                });
            });
        };

        if (fileInput) {
            reader.readAsDataURL(fileInput);
        } else {
            reader.onloadend();
        }
    });

    function enableFormWithoutLine() {
        ['department', 'machineName', 'reporterName'].forEach(function(id) {
            var el = document.getElementById(id);
            el.removeAttribute('readonly');
            el.removeAttribute('required');
        });
    }

    function scanQRCode() {
        liff.scanCodeV2().then(result => {
            let scannedValue = result.value.trim();
            if (scannedValue.includes('size150')) {
                scannedValue = scannedValue.replace('size150', '');
            }
            document.getElementById("machineNumber").value = scannedValue;
            fetchUserData(userId, scannedValue).then(data => {
                if (data) document.getElementById("machineName").value = data.machineName;
            });
        }).catch(err => {
            Swal.fire({
                title: 'เกิดข้อผิดพลาด',
                text: 'ไม่สามารถสแกน QR Code ได้',
                icon: 'error',
                confirmButtonText: 'ตกลง'
            });
        });
    }

    liff.init({ liffId: "2006299650-nyMyMmdw" })
        .then(() => {
            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }
            return liff.getProfile();
        })
        .then(profile => {
            if (!profile) return;
            userId = profile.userId;
            displayName = profile.displayName;
            pictureUrl = profile.pictureUrl;
            document.getElementById("reporterName").value = displayName;
            fetchUserData(userId, '').then(data => {
                if (data) {
                    document.getElementById("reporterName").value = data.reporterName || displayName;
                    document.getElementById("department").value = data.department || '';
                }
            });
        })
        .catch(err => {
            var errCode = (err && err.code) ? err.code : 'UNKNOWN';
            console.warn('LIFF init failed:', errCode, err);
            Swal.fire({
                icon: 'warning',
                title: 'เชื่อมต่อ LINE ไม่ได้',
                text: 'ยังสามารถส่งแบบฟอร์มได้ กรุณากรอกข้อมูลด้วยตนเอง',
                confirmButtonText: 'ตกลง'
            });
            enableFormWithoutLine();
        });
</script>

</body>
</html>
